<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">BFFT BH7 SFDR summary</title>
  <desc id="desc">A release card showing BFFT f64 native matching FFTW and f32 native clearing the 144 dB BH7 target at N 4194304.</desc>
  <rect width="1200" height="620" fill="#f6f7f2"/>
  <rect x="48" y="48" width="1104" height="524" rx="18" fill="#ffffff" stroke="#d7d9ce"/>
  <text x="88" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#17211b">BFFT BH7 SFDR check</text>
  <text x="88" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#4f5b52">Native output, periodic seven-term Blackman-Harris, N = 4194304, Apple M4 NEON</text>
  <line x1="88" y1="210" x2="1112" y2="210" stroke="#d7d9ce"/>
  <text x="88" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#17211b">f64-native</text>
  <text x="88" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="700" fill="#0f6b63">197.848 dB</text>
  <text x="88" y="342" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#4f5b52">FFTW f64: 197.848 dB, relative mismatch 1.80e-16</text>
  <rect x="88" y="382" width="462" height="34" rx="17" fill="#dfeeea"/>
  <rect x="88" y="382" width="462" height="34" rx="17" fill="#0f6b63"/>
  <text x="624" y="265" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#17211b">f32-native</text>
  <text x="624" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="700" fill="#365f9d">144.956 dB</text>
  <text x="624" y="342" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#4f5b52">FFTWf: 139.165 dB, target: 144 dB</text>
  <rect x="624" y="382" width="462" height="34" rx="17" fill="#e1e8f4"/>
  <rect x="624" y="382" width="465" height="34" rx="17" fill="#365f9d"/>
  <line x1="1086" y1="374" x2="1086" y2="424" stroke="#17211b" stroke-width="2"/>
  <text x="1026" y="458" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#4f5b52">144 dB floor</text>
  <text x="88" y="512" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#17211b">Rounded float32 twiddle tables remove folded-bin recurrence spurs while keeping float butterfly math.</text>
</svg>
