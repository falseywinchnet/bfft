<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">BFFT precision badge</title>
  <desc id="desc">Compact BFFT release badge showing f64 parity and f32 BH7 pass.</desc>
  <rect width="1200" height="360" rx="0" fill="#eef1f4"/>
  <rect x="42" y="42" width="1116" height="276" rx="22" fill="#ffffff" stroke="#cdd4db"/>
  <text x="84" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#18212a">BFFT precision snapshot</text>
  <text x="84" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#55606c">BH7 SFDR, native output, N = 4194304</text>
  <rect x="84" y="198" width="304" height="72" rx="12" fill="#e0f1ed"/>
  <text x="106" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#245c56">f64-native</text>
  <text x="106" y="258" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#0f6b63">197.848 dB</text>
  <rect x="448" y="198" width="304" height="72" rx="12" fill="#e5ecf8"/>
  <text x="470" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#385681">f32-native</text>
  <text x="470" y="258" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#365f9d">144.956 dB</text>
  <rect x="812" y="198" width="260" height="72" rx="12" fill="#f2eadb"/>
  <text x="834" y="226" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#6b5425">f32 target</text>
  <text x="834" y="258" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#7b5b13">144 dB pass</text>
</svg>
